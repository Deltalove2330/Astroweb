<!-- Script para el botón Data -->
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const dataBtn = document.getElementById('dataBtn');
        
        dataBtn.addEventListener('click', async function() {
            try {
                // Mostrar loading
                const originalText = dataBtn.innerHTML;
                dataBtn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Cargando...';
                dataBtn.disabled = true;
                
                // Obtener la URL del dashboard
                const response = await fetch('/api/client-dashboard-url');
                
                if (!response.ok) {
                    throw new Error(`Error HTTP: ${response.status}`);
                }
                
                const data = await response.json();
                
                // Restaurar botón
                dataBtn.innerHTML = originalText;
                dataBtn.disabled = false;
                
                if (data.success && data.url) {
                    // Verificar que la URL sea válida
                    if (data.url.startsWith('http')) {
                        // Abrir la URL en una nueva pestaña
                        window.open(data.url, '_blank');
                    } else {
                        console.error('URL inválida:', data.url);
                        alert('URL del dashboard no es válida');
                    }
                } else {
                    console.error('Respuesta API:', data);
                    alert(data.message || 'No hay dashboard disponible para su cuenta');
                }
                
            } catch (error) {
                // Restaurar botón
                if (dataBtn) {
                    dataBtn.innerHTML = '<i class="bi bi-graph-up"></i> Data';
                    dataBtn.disabled = false;
                }
                
                console.error('Error al cargar dashboard:', error);
                alert('Error al conectar con el servidor. Intente de nuevo.');
            }
        });
    });
</script>
</body>
