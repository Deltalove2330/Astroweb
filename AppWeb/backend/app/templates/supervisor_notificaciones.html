<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notificaciones - Supervisor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/notifications.css') }}">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
    </style>
</head>
<body>
    <div class="notifications-container">
        <!-- Header -->
        <div class="notifications-header">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h1><i class="bi bi-bell"></i> Notificaciones</h1>
                    <p><i class="bi bi-info-circle"></i> Supervisor - Todas las notificaciones</p>
                    <small class="text-muted">Gestiona todas las notificaciones de fotos rechazadas</small>
                </div>
                <button class="btn btn-back" onclick="window.location.href='/supervisor/'">
                    <i class="bi bi-arrow-left"></i> Volver al Sistema
                </button>
            </div>
        </div>

        <!-- Filtros -->
        <div class="filters-section">
            <div class="row align-items-end">
                <div class="col-md-3">
                    <label class="form-label">Estado</label>
                    <select class="form-select" id="filterEstado">
                        <option value="0">No leídas</option>
                        <option value="">Todas</option>
                        <option value="1">Leídas</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Límite</label>
                    <select class="form-select" id="filterLimit">
                        <option value="50">50 resultados</option>
                        <option value="100">100 resultados</option>
                        <option value="200">200 resultados</option>
                    </select>
                </div>
                <div class="col-md-6 text-end">
                    <button class="btn btn-mark-all" id="markAllReadBtn">
                        <i class="bi bi-check-all"></i> Marcar todas leídas
                    </button>
                </div>
            </div>
        </div>

        <!-- Lista de notificaciones -->
        <div id="notificationsList">
            <div class="text-center py-5">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Cargando...</span>
                </div>
                <p class="mt-3 text-white">Cargando notificaciones...</p>
            </div>
        </div>
    </div>
    <!-- Cache global de imágenes — DEBE IR PRIMERO -->
<script src="{{ url_for('static', filename='js/utils/image-cache.js') }}"></script>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script>
        let notifications = [];

        function getPhotoTypeClass(tipoFoto) {
            if (!tipoFoto) return 'desconocido';
            const tipo = tipoFoto.toLowerCase();
            if (tipo.includes('gestion')) return 'gestion';
            if (tipo.includes('precio')) return 'precio';
            if (tipo.includes('exhib')) return 'exhibiciones';
            return 'desconocido';
        }

        function getPhotoTypeIcon(tipoFoto) {
            if (!tipoFoto) return '📸';
            const tipo = tipoFoto.toLowerCase();
            if (tipo.includes('gestion')) return '🔄';
            if (tipo.includes('precio')) return '💰';
            if (tipo.includes('exhib')) return '🖼️';
            return '📸';
        }

        function loadNotifications() {
            const estado = $('#filterEstado').val();
            const limit = $('#filterLimit').val();
            
            $.ajax({
                url: '/api/notificaciones-rechazo',
                method: 'GET',
                data: {
                    leido: estado !== '' ? estado : null,
                    limit: limit
                },
                success: function(response) {
                    if (response.success) {
                        notifications = response.notificaciones || [];
                        renderNotifications();
                    } else {
                        showError('Error al cargar notificaciones');
                    }
                },
                error: function() {
                    showError('Error de conexión');
                }
            });
        }

        function renderNotifications() {
            const $list = $('#notificationsList');
            
            if (notifications.length === 0) {
                $list.html(`
                    <div class="empty-state">
                        <i class="bi bi-bell-slash"></i>
                        <h3>No hay notificaciones</h3>
                        <p>No se encontraron notificaciones con los filtros seleccionados</p>
                    </div>
                `);
                return;
            }
            
            $list.empty();
            
            notifications.forEach(function(notif) {
                const isRead = parseInt(notif.leido) === 1;
                const cardClass = isRead ? 'leida' : '';
                const badge = isRead ? 'LEÍDA' : 'NUEVA';
                const badgeClass = isRead ? 'leida' : 'nueva';
                
                const tipoFoto = notif.tipo_foto || 'Desconocido';
                const photoTypeClass = getPhotoTypeClass(tipoFoto);
                const photoTypeIcon = getPhotoTypeIcon(tipoFoto);
                
                const fecha = notif.fecha_notificacion ? 
                    new Date(notif.fecha_notificacion).toLocaleString('es-VE', {
                        day: '2-digit',
                        month: 'short',
                        year: 'numeric',
                        hour: '2-digit',
                        minute: '2-digit'
                    }) : 'Fecha desconocida';
                
                const rechazadoPor = notif.rechazado_por === 'cliente' ? 
                    '<i class="bi bi-person"></i> Cliente' : 
                    `<i class="bi bi-person-badge"></i> ${notif.rechazado_por}`;
                
                const card = `
                    <div class="notification-card ${cardClass}" data-id="${notif.id_notificacion}">
                        <div class="d-flex justify-content-between align-items-start mb-2">
                            <div class="flex-grow-1">
                                <span class="notification-badge ${badgeClass}">${badge}</span>
                                <div class="notification-title mt-2">
                                    Rechazo de Foto #${notif.id_foto_original || notif.id_foto_rechazada} - Visita #${notif.id_visita}
                                </div>
                                <span class="photo-type-badge ${photoTypeClass}">
                                    ${photoTypeIcon} ${tipoFoto}
                                </span>
                            </div>
                            ${!isRead ? `
                                <button class="btn btn-mark-read" onclick="markAsRead(${notif.id_notificacion})">
                                    <i class="bi bi-check"></i> Marcar leída
                                </button>
                            ` : ''}
                        </div>
                        
                        <div class="notification-details">
                            <div class="notification-detail-item">
                                <i class="bi bi-image"></i>
                                <strong>Foto ID:</strong> ${notif.id_foto_original || 'N/A'}
                            </div>
                            <div class="notification-detail-item">
                                <i class="bi bi-building"></i>
                                <strong>Cliente:</strong> ${notif.nombre_cliente || 'Desconocido'}
                            </div>
                            <div class="notification-detail-item">
                                <i class="bi bi-geo-alt"></i>
                                <strong>Punto:</strong> ${notif.punto_venta || 'Desconocido'}
                            </div>
                            <div class="notification-detail-item">
                                <i class="bi bi-person-badge"></i>
                                <strong>Rechazado por:</strong> ${rechazadoPor}
                            </div>
                            <div class="notification-detail-item">
                                <i class="bi bi-clock"></i>
                                <strong>Fecha:</strong> ${fecha}
                            </div>
                        </div>
                    </div>
                `;
                
                $list.append(card);
            });
        }

        function markAsRead(notifId) {
            $.ajax({
                url: `/api/marcar-notificacion-leida/${notifId}`,
                method: 'POST',
                success: function(response) {
                    if (response.success) {
                        Swal.fire({
                            icon: 'success',
                            title: 'Marcada como leída',
                            toast: true,
                            position: 'top-end',
                            showConfirmButton: false,
                            timer: 2000
                        });
                        loadNotifications();
                    }
                }
            });
        }

        function markAllAsRead() {
            Swal.fire({
                title: '¿Marcar todas como leídas?',
                text: 'Esto marcará todas las notificaciones no leídas',
                icon: 'question',
                showCancelButton: true,
                confirmButtonText: 'Sí, marcar todas',
                cancelButtonText: 'Cancelar'
            }).then((result) => {
                if (result.isConfirmed) {
                    $.ajax({
                        url: '/api/marcar-todas-leidas',
                        method: 'POST',
                        success: function(response) {
                            if (response.success) {
                                Swal.fire({
                                    icon: 'success',
                                    title: 'Todas marcadas',
                                    timer: 2000,
                                    showConfirmButton: false
                                });
                                loadNotifications();
                            }
                        }
                    });
                }
            });
        }

        function showError(message) {
            Swal.fire({
                icon: 'error',
                title: 'Error',
                text: message
            });
        }

        $(document).ready(function() {
            loadNotifications();
            
            $('#filterEstado, #filterLimit').change(function() {
                loadNotifications();
            });
            
            $('#markAllReadBtn').click(function() {
                markAllAsRead();
            });
        });
        
        window.markAsRead = markAsRead;
    </script>
</body>
</html>
