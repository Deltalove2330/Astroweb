<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Encuestador</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #f0f2f5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .form-container { max-width: 800px; margin: 40px auto; background: white; border-radius: 15px; box-shadow: 0 0 20px rgba(0,0,0,0.1); padding: 30px; }
        .form-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; margin: -30px -30px 20px -30px; padding: 20px; border-radius: 15px 15px 0 0; }
        .btn-submit { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; padding: 10px 30px; font-size: 1.1rem; }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .radio-group { display: flex; gap: 20px; margin-top: 5px; }
        .form-label { font-weight: 600; }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-container">
            <div class="form-header text-center">
                <h2><i class="fas fa-clipboard-list me-2"></i>Formulario de Encuesta - Cantinas</h2>
                <p class="mb-0">Complete todos los campos requeridos</p>
            </div>
            <form id="encuestaForm">
                <!-- Zona/Municipio -->
                <div class="mb-3">
                    <label class="form-label">Zona / Municipio <span class="text-danger">*</span></label>
                    <select class="form-select" id="municipio" required>
                        <option value="">Seleccione...</option>
                        <option value="Chacao">Chacao</option>
                        <option value="Libertador">Libertador</option>
                        <option value="Baruta">Baruta</option>
                        <option value="Sucre">Sucre</option>
                        <option value="Hatillo">Hatillo</option>
                        <option value="Otro">Otro</option>
                    </select>
                </div>

                <!-- Nombre del local -->
                <div class="mb-3">
                    <label class="form-label">Nombre del local <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="nombre_local" required>
                </div>

                <!-- Punto de referencia -->
                <div class="mb-3">
                    <label class="form-label">Punto de referencia <span class="text-danger">*</span></label>
                    <textarea class="form-control" id="punto_referencia" rows="2" required></textarea>
                </div>

                <!-- Enlace de Ubicacion (Google Maps) -->
                <div class="mb-3">
                    <label class="form-label">Enlace de Ubicacion (Google Maps)</label>
                    <input type="url" class="form-control" id="enlace_ubicacion" placeholder="https://maps.google.com/...">
                </div>

                <!-- Tipo de Cantina -->
                <div class="mb-3">
                    <label class="form-label">Tipo de Cantina <span class="text-danger">*</span></label>
                    <select class="form-select" id="tipo_cantina" required>
                        <option value="">Seleccione...</option>
                        <option value="Educacion Inicial">Educacion Inicial</option>
                        <option value="Primaria/Media">Primaria/Media</option>
                        <option value="Universitaria">Universitaria</option>
                        <option value="Clinica/Salud">Clinica/Salud</option>
                    </select>
                </div>

                <!-- Cliente interesado en los productos -->
                <div class="mb-3">
                    <label class="form-label">Cliente interesado en los productos <span class="text-danger">*</span></label>
                    <div class="radio-group">
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="cliente_interesado" id="cliente_si" value="si" required>
                            <label class="form-check-label" for="cliente_si">Si</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="cliente_interesado" id="cliente_no" value="no" required>
                            <label class="form-check-label" for="cliente_no">No</label>
                        </div>
                    </div>
                </div>

                <!-- Nombre y Apellido del Encargado -->
                <div class="mb-3">
                    <label class="form-label">Nombre y Apellido del Encargado <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="nombre_encargado" required>
                </div>

                <!-- Numero de Telefono de Contacto -->
                <div class="mb-3">
                    <label class="form-label">Numero de Telefono de Contacto <span class="text-danger">*</span></label>
                    <input type="tel" class="form-control" id="telefono" required>
                </div>

                <!-- Correo Electronico -->
                <div class="mb-3">
                    <label class="form-label">Correo Electronico <span class="text-danger">*</span></label>
                    <input type="email" class="form-control" id="correo" required>
                </div>

                <!-- Cargo del Contacto -->
                <div class="mb-3">
                    <label class="form-label">Cargo del Contacto <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="cargo" required>
                </div>

                <!-- Cumple con la documentacion requerida -->
                <div class="mb-3">
                    <label class="form-label">Cumple con la documentacion requerida? <span class="text-danger">*</span></label>
                    <div class="radio-group">
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="documentacion_cumple" id="doc_si" value="si" required>
                            <label class="form-check-label" for="doc_si">Si</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="documentacion_cumple" id="doc_no" value="no" required>
                            <label class="form-check-label" for="doc_no">No</label>
                        </div>
                    </div>
                </div>

                <!-- Razon Social -->
                <div class="mb-3">
                    <label class="form-label">Razon Social <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="razon_social" required>
                </div>

                <!-- RIF -->
                <div class="mb-3">
                    <label class="form-label">RIF <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="rif" placeholder="J-12345678-0" required>
                </div>

                <div class="text-center">
                    <button type="submit" class="btn btn-submit text-white"><i class="fas fa-save me-2"></i>Guardar Encuesta</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        $('#encuestaForm').on('submit', function(e) {
            e.preventDefault();
            const formData = {
                municipio: $('#municipio').val(),
                nombre_local: $('#nombre_local').val(),
                punto_referencia: $('#punto_referencia').val(),
                enlace_ubicacion: $('#enlace_ubicacion').val(),
                tipo_cantina: $('#tipo_cantina').val(),
                cliente_interesado: $('input[name="cliente_interesado"]:checked').val(),
                nombre_encargado: $('#nombre_encargado').val(),
                telefono: $('#telefono').val(),
                correo: $('#correo').val(),
                cargo: $('#cargo').val(),
                documentacion_cumple: $('input[name="documentacion_cumple"]:checked').val(),
                razon_social: $('#razon_social').val(),
                rif: $('#rif').val()
            };
            
            $.ajax({
                url: '/encuestador/api/guardar',
                method: 'POST',
                contentType: 'application/json',
                data: JSON.stringify(formData),
                success: function(res) {
                    if (res.success) {
                        Swal.fire('Exito', res.message, 'success').then(() => {
                            $('#encuestaForm')[0].reset();
                        });
                    } else {
                        Swal.fire('Error', res.error, 'error');
                    }
                },
                error: function(xhr) {
                    Swal.fire('Error', 'Ocurrio un error al guardar', 'error');
                }
            });
        });
    </script>
</body>
</html>
