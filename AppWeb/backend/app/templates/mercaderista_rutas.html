<!-- templates/mercaderista_rutas.html -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asignación de Rutas - Mercaderistas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
    <style>
        .mercaderista-card {
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .mercaderista-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .mercaderista-card.active {
            border: 2px solid #0d6efd;
            background-color: #f0f7ff;
        }
        .route-badge {
            font-size: 0.75rem;
            margin: 2px;
        }
        .tipo-fija {
            background-color: #198754;
            color: white;
        }
        .tipo-variable {
            background-color: #ffc107;
            color: #000;
        }
    </style>
</head>
<body>
    <div class="container-fluid mt-4">
        <!-- Encabezado -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="mb-0">
                <i class="bi bi-people me-2 text-primary"></i>Asignación de Rutas - Mercaderistas
            </h2>
            <button class="btn btn-outline-secondary" onclick="location.href='/rutas/'">
                <i class="bi bi-arrow-left me-1"></i>Volver a Rutas
            </button>
        </div>

        <!-- Filtros -->
        <div class="card mb-4">
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label fw-bold">Buscar Mercaderista</label>
                        <input type="text" id="search-mercaderista" class="form-control" 
                               placeholder="Nombre, cédula o email...">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label fw-bold">Estado</label>
                        <select id="filter-activo" class="form-select">
                            <option value="">Todos</option>
                            <option value="1">Activos</option>
                            <option value="0">Inactivos</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label fw-bold">Tipo</label>
                        <select id="filter-tipo" class="form-select">
                            <option value="">Todos</option>
                            <option value="Fijo">Fijo</option>
                            <option value="Variable">Variable</option>
                        </select>
                    </div>
                    <div class="col-md-2 d-flex align-items-end">
                        <button class="btn btn-primary w-100" id="filter-btn">
                            <i class="bi bi-search me-1"></i>Filtrar
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Lista de Mercaderistas -->
        <div id="mercaderistas-list" class="row">
            <div class="col-12">
                <div class="text-center py-5">
                    <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;">
                        <span class="visually-hidden">Cargando...</span>
                    </div>
                    <p class="mt-3 text-muted">Cargando mercaderistas...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- ======================================================================= -->
    <!-- MODAL: Detalle y Asignación de Rutas -->
    <!-- ======================================================================= -->
    <div class="modal fade" id="routeAssignmentModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-xl modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title" id="modalMercaderistaTitle">
                        <i class="bi bi-person-badge me-2"></i>Asignar Rutas
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="route-assignment-content">
                    <!-- Contenido dinámico -->
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                    <button type="button" class="btn btn-primary" id="save-assignments-btn">
                        <i class="bi bi-save me-1"></i>Guardar Asignaciones
                    </button>
                </div>
            </div>
        </div>
    </div>
    <!-- Cache global de imágenes — DEBE IR PRIMERO -->
<script src="{{ url_for('static', filename='js/utils/image-cache.js') }}"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="/static/js/mercaderista_rutas.js"></script>
</body>
</html>
