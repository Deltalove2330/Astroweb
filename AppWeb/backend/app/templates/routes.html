
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Rutas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">

    <link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/apple-touch-icon.png') }}">
    <link rel="icon" href="{{ url_for('static', filename='icons/favicon.ico') }}" type="image/x-icon">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <div class="container-fluid mt-4">
        <h2><i class="bi bi-map me-2"></i>Gestión de Rutas</h2>
        
        <!-- Botón crear nueva ruta -->
        <div class="mb-3">
            <button class="btn btn-primary" id="create-route-btn">
                <i class="bi bi-plus-circle me-1"></i>Crear Nueva Ruta
            </button>
        </div>
        
        <!-- Lista de rutas -->
        <div id="routes-list" class="row">
            <div class="col-12">
                <div class="text-center">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Cargando...</span>
                    </div>
                    <p class="mt-2">Cargando rutas...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal para crear/editar rutas -->
    <div class="modal fade" id="routeModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="routeModalTitle">Gestión de Ruta</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="route-details">
                        <!-- Contenido dinámico -->
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary d-none" id="cancel-edit-btn">Cancelar Edición</button>
                    <button type="button" class="btn btn-primary d-none" id="save-all-btn">Guardar Todos los Cambios</button>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/routes.js') }}"></script>
</body>
</html>
