{% extends 'supervisor_base.html' %}

{% block title %}Solicitudes de Usuarios - Atención al Cliente{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1><i class="bi bi-clipboard-check"></i> Solicitudes de Usuarios</h1>
        <div>
            <button class="btn btn-primary" id="btnActualizarSolicitudes">
                <i class="bi bi-arrow-clockwise"></i> Actualizar
            </button>
            <button class="btn btn-secondary" onclick="window.location.href='/atencion-cliente/dashboard'">
                <i class="bi bi-arrow-left"></i> Volver
            </button>
        </div>
    </div>

    <div id="solicitudesContainer">
        <div class="text-center py-5">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Cargando...</span>
            </div>
            <p class="mt-3">Cargando solicitudes pendientes...</p>
        </div>
    </div>
</div>

<!-- Modal para rechazar solicitud -->
<div class="modal fade" id="modalRechazarSolicitud" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Rechazar Solicitud</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="rechazarSolicitudId">
                <div class="mb-3">
                    <label class="form-label">Motivo del rechazo (opcional)</label>
                    <textarea class="form-control" id="motivoRechazo" rows="4" placeholder="Escribe el motivo aquí..."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-danger" id="btnConfirmarRechazo">Rechazar</button>
            </div>
        </div>
    </div>
</div>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="{{ url_for('static', filename='js/modules/atencion-cliente-solicitudes.js') }}"></script>
{% endblock %}
