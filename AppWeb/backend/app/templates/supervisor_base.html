<!-- /app/templates/supervisor_base.html -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Módulo Supervisor{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/notifications.css') }}">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <link rel="apple-touch-icon" href="/static/icons/apple-touch-icon.png">
    <link rel="icon" href="/static/icons/favicon.ico" type="image/x-icon">
    <style>
        body {
            background-color: #f8f9fa;
            padding-top: 20px;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        .supervisor-main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 15px;
        }
        .supervisor-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 15px 25px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }
        .supervisor-header h4 {
            margin: 0;
            font-weight: 600;
            font-size: 1.25rem;
        }
        .supervisor-header small {
            opacity: 0.9;
            font-size: 0.9rem;
        }
        .supervisor-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .btn-notification {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .btn-notification:hover {
            background: rgba(255,255,255,0.3);
            transform: scale(1.05);
        }
        .notification-badge {
            position: absolute;
            top: -4px;
            right: -4px;
            background: #ff4757;
            color: white;
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 10px;
            min-width: 18px;
            text-align: center;
        }
        .btn-outline-danger {
            border-width: 2px;
            font-weight: 500;
        }
        .nav-tabs {
            border-bottom: 2px solid #e9ecef;
            margin-bottom: 20px;
        }
        .nav-tabs .nav-link {
            border: none;
            color: #6c757d;
            font-weight: 500;
            padding: 12px 20px;
            border-radius: 8px 8px 0 0;
            transition: all 0.2s;
        }
        .nav-tabs .nav-link:hover {
            color: #667eea;
            background: rgba(102, 126, 234, 0.1);
        }
        .nav-tabs .nav-link.active {
            color: #667eea;
            background: white;
            border-bottom: 3px solid #667eea;
            font-weight: 600;
        }
        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            transition: transform 0.2s, box-shadow 0.2s;
            overflow: hidden;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }
        .photo-thumbnail {
            height: 220px;
            object-fit: cover;
            cursor: pointer;
            transition: transform 0.3s;
        }
        .photo-thumbnail:hover {
            transform: scale(1.03);
        }
        .card-title {
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 8px;
            color: #2c3e50;
        }
        .card-text {
            font-size: 0.875rem;
            color: #6c757d;
            line-height: 1.5;
        }
        .badge {
            font-weight: 500;
            padding: 6px 12px;
            border-radius: 20px;
        }
        .badge.bg-danger { background: #ff6b6b !important; }
        .badge.bg-success { background: #51cf66 !important; }
        .badge.bg-warning { background: #ffd43b !important; color: #333; }
        .badge.bg-secondary { background: #adb5bd !important; }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #6c757d;
        }
        .empty-state i {
            font-size: 3rem;
            margin-bottom: 15px;
            opacity: 0.5;
        }
        @media (max-width: 768px) {
            .supervisor-header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
            .supervisor-actions {
                width: 100%;
                justify-content: center;
            }
            .nav-tabs .nav-link {
                padding: 10px 12px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <!-- ✅ Header único - SIN título duplicado -->
    <div class="supervisor-main">
        <div class="supervisor-header">
            <div>
                <!-- ✅ Título solo aquí, NO en supervisor.html -->
                <h4 class="mb-0"><i class="bi bi-shield-check me-2"></i>Panel de Supervisor</h4>
                <small class="text-white-50">Usuario: {{ current_user.username }}</small>
            </div>
            <div class="supervisor-actions">
                <!-- Campanita de notificaciones -->
                <div class="notification-bell-container position-relative">
                    <button class="btn btn-notification" id="notificationBell" data-bs-toggle="dropdown" aria-expanded="false">
                        <i class="bi bi-bell-fill"></i>
                        <span class="notification-badge" id="notificationCount" style="display: none;">0</span>
                    </button>
                    <div class="dropdown-menu dropdown-menu-end notification-dropdown" aria-labelledby="notificationBell">
                        <div class="notification-header">
                            <h6 class="mb-0"><i class="bi bi-bell me-2"></i>Notificaciones</h6>
                            <button id="markAllAsRead" class="btn btn-sm btn-link p-0 text-decoration-none">Marcar todas</button>
                        </div>
                        <div class="notification-body" id="notificationList">
                            <div class="text-center py-3">
                                <div class="spinner-border spinner-border-sm text-primary" role="status"></div>
                            </div>
                        </div>
                        <div class="notification-footer text-center py-2">
                            <a href="/supervisor/notificaciones" id="viewAllNotifications" class="text-decoration-none small">Ver todas →</a>
                        </div>
                    </div>
                </div>
                <!-- Botón logout -->
                <button id="supervisor-logout" class="btn btn-outline-light btn-sm">
                    <i class="bi bi-box-arrow-right me-1"></i> Salir
                </button>
            </div>
        </div>
    </div>
    
    <!-- Contenido principal -->
    <main class="supervisor-main">
        {% block content %}{% endblock %}
    </main>

    <!-- ✅ Scripts esenciales -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="{{ url_for('static', filename='js/websocket-notifications.js') }}"></script>
    
    <script>
        // Logout handler
        document.getElementById('supervisor-logout')?.addEventListener('click', function() {
            fetch('/logout', { method: 'GET', credentials: 'same-origin' })
                .then(() => { window.location.href = '/login'; })
                .catch(err => console.error('Error logout:', err));
        });
    </script>
</body>
</html>
