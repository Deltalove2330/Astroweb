<!-- /app/templates/supervisor_base.html -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Módulo Supervisor{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css " rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css ">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <link rel="apple-touch-icon" href="/static/icons/apple-touch-icon.png">
<link rel="icon" href="/static/icons/favicon.ico" type="image/x-icon">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js "></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js "></script>
    <script type="module" src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11 "></script>
    <style>
        body {
            background-color: #f8f9fa;
            padding-top: 20px;
        }
        .supervisor-main {
            max-width: 1200px;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <main class="supervisor-main">
        {% block content %}{% endblock %}
    </main>
    
    <!-- Botón de logout específico para supervisor -->
    <div style="position: fixed; top: 20px; right: 20px;">
        <button id="supervisor-logout" class="btn btn-outline-danger">
            <i class="bi bi-box-arrow-right"></i> Salir
        </button>
    </div>
    
    <script>
        document.getElementById('supervisor-logout').addEventListener('click', function() {
            fetch('/logout', { method: 'GET' })
                .then(() => window.location.href = '/login');
        });
    </script>
</body>
</html>
