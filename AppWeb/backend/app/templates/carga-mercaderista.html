<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Carga - Mercaderista</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/carga-mercaderista.css') }}">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <link rel="apple-touch-icon" href="/static/icons/apple-touch-icon.png">
<link rel="icon" href="/static/icons/favicon.ico" type="image/x-icon">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">
                <i class="bi bi-person-badge me-2"></i>
                Panel de Carga - <span id="merchandiserName">Cargando...</span>
            </span>
            <button class="btn btn-outline-danger" onclick="logoutMercaderista()">
                <i class="bi bi-box-arrow-right me-1"></i>Salir
            </button>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-12">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h3>Mis Visitas Pendientes</h3>
                </div>
                
                <div id="visitasContainer">
                    <div class="text-center py-5">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">Cargando...</span>
                        </div>
                        <p class="mt-3">Cargando visitas pendientes...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal de Carga de Datos con Productos Dinámicos -->
    <div class="modal fade" id="cargaModal" tabindex="-1" aria-labelledby="cargaModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-xl">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title" id="cargaModalLabel">
                        <i class="bi bi-upload me-2"></i>Cargar Datos de Visita
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                
                <form id="formCargaDatos">
                    <div class="modal-body">
                        <!-- Datos visibles de la tarjeta -->
                        <div class="alert alert-info mb-4">
                            <h6 class="alert-heading">
                                <i class="bi bi-card-text me-2"></i>Datos de la Visita
                            </h6>
                            <div class="row">
                                <div class="col-md-3">
                                    <strong><i class="bi bi-hash me-1"></i>Visita:</strong><br>
                                    <span class="text-primary fw-bold" id="modalVisitId">#</span>
                                </div>
                                <div class="col-md-3">
                                    <strong><i class="bi bi-building me-1"></i>Cliente:</strong><br>
                                    <span id="modalCliente">-</span>
                                </div>
                                <div class="col-md-3">
                                    <strong><i class="bi bi-geo-alt me-1"></i>Punto:</strong><br>
                                    <span id="modalPunto">-</span>
                                </div>
                                <div class="col-md-3">
                                    <strong><i class="bi bi-person-badge me-1"></i>Mercaderista:</strong><br>
                                    <span id="modalMercaderista">-</span>
                                </div>
                            </div>
                            <div class="row mt-2">
                                <div class="col-md-12">
                                    <strong><i class="bi bi-calendar-date me-1"></i>Fecha:</strong>
                                    <span id="modalFecha">-</span>
                                </div>
                            </div>
                        </div>

                        <!-- Contenedor dinámico de productos -->
                        <div id="productosContainer">
                            <!-- Producto 1 (se agregará dinámicamente) -->
                        </div>

                        <!-- Botón para agregar más productos -->
                        <div class="text-center mt-3">
                            <button type="button" class="btn btn-outline-primary" id="btnAgregarProducto">
                                <i class="bi bi-plus-circle me-1"></i>Agregar Producto
                            </button>
                        </div>

                        <!-- Campos ocultos para referencia -->
                        <input type="hidden" id="visitId" name="visitId">
                        <input type="hidden" id="clienteNombre" name="clienteNombre">
                        <input type="hidden" id="puntoInteresNombre" name="puntoInteresNombre">
                        <input type="hidden" id="fechaVisita" name="fechaVisita">
                        <input type="hidden" id="mercaderistaNombre" name="mercaderistaNombre">
                    </div>
                    
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                            <i class="bi bi-x-circle me-1"></i>Cancelar
                        </button>
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-circle me-1"></i>Guardar Productos
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Incluir jQuery y Bootstrap -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/modules/carga-mercaderista.js') }}"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="{{ url_for('static', filename='js/modules/logout-mercaderista.js') }}"></script>
</body>
</html>
