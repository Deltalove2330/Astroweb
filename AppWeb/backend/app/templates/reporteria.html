<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reportes - Activaciones</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Plotly JS -->
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <!-- CSS personalizado -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/reporteria.css') }}">
</head>
<body>
    <div class="container-fluid py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-bar-chart-line me-2"></i>Reportes de Activaciones</h2>
            <a href="/" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left me-1"></i> Volver al panel
            </a>
        </div>
        
        <!-- Filtros -->
        <div class="filtros">
            <h4 class="mb-3"><i class="bi bi-funnel me-2"></i>Filtros</h4>
            <div class="row">
                <div class="col-md-3 filtro-group">
                    <label for="fecha-inicio"><i class="bi bi-calendar me-1"></i>Fecha Inicio</label>
                    <input type="date" id="fecha-inicio" class="form-control">
                </div>
                <div class="col-md-3 filtro-group">
                    <label for="fecha-fin"><i class="bi bi-calendar me-1"></i>Fecha Fin</label>
                    <input type="date" id="fecha-fin" class="form-control">
                </div>
                <div class="col-md-3 filtro-group">
                    <label for="cliente"><i class="bi bi-building me-1"></i>Cliente</label>
                    <select id="cliente" class="form-select">
                        <option value="todos">Todos los clientes</option>
                        <!-- Los clientes se cargarán dinámicamente -->
                    </select>
                </div>
                <div class="col-md-3 filtro-group">
                    <label for="region"><i class="bi bi-geo-alt me-1"></i>Región (Cuadrante)</label>
                    <select id="region" class="form-select">
                        <option value="todas">Todas las regiones</option>
                        <!-- Las regiones se cargarán dinámicamente -->
                    </select>
                </div>
                <div class="col-md-12 text-end mt-3">
                    <button class="btn-aplicar" id="aplicar-filtros">
                        <i class="bi bi-check-lg me-1"></i> Aplicar Filtros
                    </button>
                    <button class="btn btn-outline-secondary ms-2" id="limpiar-filtros">
                        <i class="bi bi-x-circle me-1"></i> Limpiar
                    </button>
                </div>
            </div>
        </div>
        
        <!-- Gráfico principal -->
        <div class="report-card">
            <div class="card-header">
                <h5><i class="bi bi-bar-chart me-2"></i>Activaciones por Tipo y Estado</h5>
                <div class="d-flex align-items-center">
                    <span class="badge bg-primary me-3" id="total-activaciones">Total: 0</span>
                    <button class="btn btn-sm btn-outline-light" id="descargar-datos">
                        <i class="bi bi-download me-1"></i> Exportar
                    </button>
                </div>
            </div>
            <div class="card-body">
                <div class="grafico-container" id="grafico-principal">
                    <!-- El gráfico se cargará aquí -->
                </div>
                
                <!-- Resumen de datos -->
                <div class="row mt-4" id="resumen-datos">
                    <div class="col-md-12">
                        <h6><i class="bi bi-info-circle me-2"></i>Resumen</h6>
                        <div class="table-responsive">
                            <table class="table table-dark table-hover">
                                <thead>
                                    <tr>
                                        <th>Tipo Activación</th>
                                        <th>Estado</th>
                                        <th>Cantidad</th>
                                        <th>Porcentaje</th>
                                    </tr>
                                </thead>
                                <tbody id="tabla-resumen">
                                    <!-- Los datos se cargarán dinámicamente -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- jQuery y Bootstrap JS -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- JS personalizado para reportería -->
    <script src="{{ url_for('static', filename='js/reporteria.js') }}"></script>
</body>
</html>
