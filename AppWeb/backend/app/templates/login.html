<!-- login.html -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AstroWeb - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
    <script type="module" src="{{ url_for('static', filename='js/modules/auth.js') }}"></script>
    <script src="{{ url_for('static', filename='js/modules/reset_password.js') }}"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <div class="login-wrapper">
        <!-- Fondo animado -->
        <div class="animated-bg">
            <div class="bubble"></div>
            <div class="bubble"></div>
            <div class="bubble"></div>
            <div class="bubble"></div>
        </div>

        <!-- Card de login -->
        <div class="glass-card login-card active">
            <div class="card-header">
                <div class="logo-wrapper">
                    <i class="fas fa-rocket me-2"></i>
                    <h3>AstroWeb</h3>
                </div>
                <p class="subtitle">Bienvenido de vuelta</p>
            </div>
            
            <div class="card-body">
                <form id="loginForm">
                    <div class="input-group mb-4">
                        <div class="input-wrapper">
                            <i class="fas fa-user input-icon"></i>
                            <input type="text" 
                                   class="form-control" 
                                   id="username" 
                                   name="username" 
                                   placeholder="Usuario" 
                                   required>
                            <div class="input-line"></div>
                        </div>
                    </div>
                    
                    <div class="input-group mb-4">
                        <div class="input-wrapper">
                            <i class="fas fa-lock input-icon"></i>
                            <input type="password" 
                                   class="form-control" 
                                   id="password" 
                                   name="password" 
                                   placeholder="Contraseña" 
                                   required>
                            <div class="input-line"></div>
                            <!-- <button type="button" class="toggle-password" id="togglePassword">
                                <i class="fas fa-eye"></i>
                            </button> -->
                        </div>
                    </div>

                    <div class="form-options mb-4">
                        <label class="checkbox-container">
                            <input type="checkbox" id="remember" name="remember">
                            <span class="checkmark"></span>
                            Recordarme
                        </label>
                        <a href="#" id="forgot-password-link" class="forgot-link">¿Olvidaste tu contraseña?</a>
                    </div>
                    
                    <button type="submit" class="btn-login" id="loginBtn">
                        <span class="btn-text">Iniciar Sesión</span>
                    </button>
                </form>
            </div>
        </div>

        <!-- Card de restablecimiento de contraseña -->
        <div class="glass-card reset-card">
            <div class="card-header">
                <div class="logo-wrapper">
                    <i class="fas fa-key me-2"></i>
                    <h3>Restablecer Contraseña</h3>
                </div>
                <p class="subtitle">Ingresa tus datos para recuperar acceso</p>
            </div>
            
            <div class="card-body">
                <!-- Paso 1: Solicitar usuario -->
                <div class="reset-step" id="reset-step1">
                    <div class="input-group mb-4">
                        <div class="input-wrapper">
                            <i class="fas fa-user input-icon"></i>
                            <input type="text" 
                                   class="form-control" 
                                   id="reset-username" 
                                   placeholder="Usuario" 
                                   required>
                            <div class="input-line"></div>
                        </div>
                    </div>
                    
                    <div class="d-flex justify-content-between mt-4">
                        <button type="button" class="btn-back" id="back-to-login">
                            <i class="fas fa-arrow-left me-2"></i>Volver
                        </button>
                        <button type="button" class="btn-next" id="request-reset-code">
                            Restablecer<i class="fas fa-arrow-right ms-2"></i>
                        </button>
                    </div>
                </div>

                <!-- Paso 2: Ingresar código y nueva contraseña -->
                <div class="reset-step" id="reset-step2" style="display: none;">
                    <div class="input-group mb-3">
                        <div class="input-wrapper">
                            <i class="fas fa-shield-alt input-icon"></i>
                            <input type="text" 
                                   class="form-control" 
                                   id="reset-code" 
                                   placeholder="Código de verificación" 
                                   required>
                            <div class="input-line"></div>
                        </div>
                    </div>
                    
                    <div class="input-group mb-3">
                        <div class="input-wrapper">
                            <i class="fas fa-lock input-icon"></i>
                            <input type="password" 
                                   class="form-control" 
                                   id="new-password" 
                                   placeholder="Nueva contraseña" 
                                   required>
                            <div class="input-line"></div>
                        </div>
                    </div>
                    
                    <div class="input-group mb-4">
                        <div class="input-wrapper">
                            <i class="fas fa-lock input-icon"></i>
                            <input type="password" 
                                   class="form-control" 
                                   id="confirm-password" 
                                   placeholder="Confirmar contraseña" 
                                   required>
                            <div class="input-line"></div>
                        </div>
                    </div>
                    
                    <div class="d-flex justify-content-between mt-4">
                        <button type="button" class="btn-back" id="back-to-step1">
                            <i class="fas fa-arrow-left me-2"></i>Volver
                        </button>
                        <button type="button" class="btn-next" id="confirm-reset">
                            Aceptar<i class="fas fa-check ms-2"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/modules/login.js') }}"></script>
</body>
</html>
