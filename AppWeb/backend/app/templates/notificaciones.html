<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notificaciones</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/notifications.css') }}">
</head>
<body>
    <div class="notifications-page">
        <div class="container">
            <div class="notifications-container">
                <!-- Header -->
                <div class="notifications-header">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h1><i class="bi bi-bell-fill"></i> Notificaciones</h1>
                            <p>Gestiona todas tus notificaciones de rechazos de fotos</p>
                        </div>
                        <a href="{{ url_for('auth.client_photos_page') }}" class="btn btn-light">
                            <i class="bi bi-arrow-left"></i> Volver
                        </a>
                    </div>
                </div>

                <!-- Controles -->
                <div class="notifications-controls">
                    <div class="notifications-filters">
                        <div class="filter-group">
                            <label>Estado</label>
                            <select id="filterEstado" class="form-select">
                                <option value="">Todas</option>
                                <option value="0" selected>No leídas</option>
                                <option value="1">Leídas</option>
                            </select>
                        </div>
                        <div class="filter-group">
                            <label>Límite</label>
                            <select id="filterLimite" class="form-select">
                                <option value="20">20 resultados</option>
                                <option value="50" selected>50 resultados</option>
                                <option value="100">100 resultados</option>
                            </select>
                        </div>
                    </div>
                    <button id="btnMarkAll" class="btn-mark-all">
                        <i class="bi bi-check-all"></i> Marcar todas leídas
                    </button>
                </div>

                <!-- Lista de notificaciones -->
                <div class="notifications-list" id="notificationsList">
                    <div class="loading-state">
                        <div class="spinner-border text-primary" role="status"></div>
                        <p class="mt-3">Cargando notificaciones...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script>
    $(document).ready(function() {
        let allNotifications = [];

        // Cargar notificaciones
        function loadNotifications() {
            const estado = $('#filterEstado').val();
            const limite = $('#filterLimite').val();

            const params = {
                limit: limite
            };

            if (estado !== '') {
                params.leido = estado;
            }

            $('#notificationsList').html(`
                <div class="loading-state">
                    <div class="spinner-border text-primary" role="status"></div>
                    <p class="mt-3">Cargando notificaciones...</p>
                </div>
            `);

            $.ajax({
                url: '/api/notificaciones-rechazo',
                method: 'GET',
                data: params,
                success: function(response) {
                    if (response.success) {
                        allNotifications = response.notificaciones;
                        renderNotifications(allNotifications);
                    } else {
                        showError('Error al cargar notificaciones');
                    }
                },
                error: function(xhr, status, error) {
                    console.error('Error:', error);
                    showError('Error de conexión al cargar notificaciones');
                }
            });
        }

        // Renderizar notificaciones
        function renderNotifications(notifications) {
            const $container = $('#notificationsList');

            if (notifications.length === 0) {
                $container.html(`
                    <div class="empty-state">
                        <i class="bi bi-bell-slash"></i>
                        <p class="mt-3">No hay notificaciones para mostrar</p>
                    </div>
                `);
                return;
            }

            $container.empty();
            notifications.forEach(notif => {
                $container.append(createNotificationItem(notif));
            });
        }

        // Crear item de notificación
        function createNotificationItem(notif) {
            const leidoNumero = parseInt(notif.leido);
            const esLeida = leidoNumero === 1;
            const unreadClass = esLeida ? '' : 'unread';
            const badgeText = esLeida ? 'LEÍDA' : 'NO LEÍDA';
            const badgeClass = esLeida ? 'bg-secondary' : 'bg-danger';

            const fecha = notif.fecha_notificacion ? 
                new Date(notif.fecha_notificacion).toLocaleString('es-VE') : 'Fecha desconocida';

            const btnText = esLeida ? 
                '<i class="bi bi-eye"></i> Vista' : 
                '<i class="bi bi-check"></i> Marcar leída';

            return `
                <div class="notification-item ${unreadClass}" data-id="${notif.id_notificacion}">
                    <div class="notification-item-header">
                        <h3>Rechazo de Foto - Visita #${notif.id_visita}</h3>
                        <span class="badge ${badgeClass}">${badgeText}</span>
                    </div>
                    <div class="notification-item-meta">
                        <div class="meta-item">
                            <i class="bi bi-building"></i>
                            <span>${notif.nombre_cliente || 'Cliente'}</span>
                        </div>
                        <div class="meta-item">
                            <i class="bi bi-geo-alt"></i>
                            <span>${notif.punto_venta || 'Punto de venta'}</span>
                        </div>
                        <div class="meta-item">
                            <i class="bi bi-person"></i>
                            <span>Rechazado por: ${notif.rechazado_por}</span>
                        </div>
                    </div>
                    ${notif.descripcion ? `
                        <div class="notification-item-description">
                            <strong>Comentario:</strong> ${notif.descripcion}
                        </div>
                    ` : ''}
                    <div class="notification-item-footer">
                        <div class="notification-item-date">
                            <i class="bi bi-clock"></i> ${fecha}
                        </div>
                        ${!esLeida ? `
                            <button class="btn-view-notification" onclick="markAsRead(${notif.id_notificacion})">
                                ${btnText}
                            </button>
                        ` : ''}
                    </div>
                </div>
            `;
        }

        // Marcar como leída
        window.markAsRead = function(notificationId) {
            $.ajax({
                url: `/api/marcar-notificacion-leida/${notificationId}`,
                method: 'POST',
                success: function(response) {
                    if (response.success) {
                        $(`.notification-item[data-id="${notificationId}"]`).fadeOut(300, function() {
                            $(this).remove();
                            if ($('.notification-item').length === 0) {
                                loadNotifications();
                            }
                        });
                        
                        Swal.fire({
                            toast: true,
                            position: 'top-end',
                            icon: 'success',
                            title: 'Notificación marcada como leída',
                            showConfirmButton: false,
                            timer: 2000
                        });
                    }
                },
                error: function(xhr, status, error) {
                    Swal.fire('Error', 'No se pudo marcar la notificación', 'error');
                }
            });
        };

        // Marcar todas como leídas
        $('#btnMarkAll').on('click', function() {
            const unreadNotifs = allNotifications.filter(n => parseInt(n.leido) === 0);
            
            if (unreadNotifs.length === 0) {
                Swal.fire('Info', 'No hay notificaciones sin leer', 'info');
                return;
            }

            Swal.fire({
                title: '¿Marcar todas como leídas?',
                text: `Se marcarán ${unreadNotifs.length} notificaciones`,
                icon: 'question',
                showCancelButton: true,
                confirmButtonText: 'Sí, marcar todas',
                cancelButtonText: 'Cancelar'
            }).then((result) => {
                if (result.isConfirmed) {
                    Promise.all(unreadNotifs.map(notif => 
                        $.ajax({
                            url: `/api/marcar-notificacion-leida/${notif.id_notificacion}`,
                            method: 'POST'
                        })
                    )).then(() => {
                        Swal.fire('Éxito', 'Todas las notificaciones marcadas', 'success');
                        loadNotifications();
                    }).catch(() => {
                        Swal.fire('Error', 'No se pudieron marcar algunas notificaciones', 'error');
                    });
                }
            });
        });

        // Filtros
        $('#filterEstado, #filterLimite').on('change', loadNotifications);

        // Mostrar error
        function showError(message) {
            $('#notificationsList').html(`
                <div class="empty-state">
                    <i class="bi bi-exclamation-triangle text-danger"></i>
                    <p class="mt-3 text-danger">${message}</p>
                    <button class="btn btn-primary mt-3" onclick="location.reload()">
                        <i class="bi bi-arrow-clockwise"></i> Reintentar
                    </button>
                </div>
            `);
        }

        // Cargar inicialmente
        loadNotifications();
    });
    </script>
</body>
</html>
