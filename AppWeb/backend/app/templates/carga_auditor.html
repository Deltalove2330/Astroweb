<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carga de Data - Auditor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            color: #2d3748;
            font-size: 2rem;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #718096;
            font-size: 1.1rem;
        }
        
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .back-btn:hover {
            background: #f7fafc;
            transform: translateX(-5px);
        }
        
        .upload-section {
            background: #f7fafc;
            border-radius: 10px;
            padding: 30px;
            margin-bottom: 30px;
        }
        
        .drag-drop {
            border: 3px dashed #cbd5e0;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }
        
        .drag-drop:hover {
            border-color: #667eea;
            background: #edf2f7;
        }
        
        .drag-drop i {
            font-size: 3rem;
            color: #667eea;
            margin-bottom: 15px;
        }
        
        .drag-drop h3 {
            color: #2d3748;
            margin-bottom: 10px;
        }
        
        .drag-drop p {
            color: #718096;
            font-size: 0.9rem;
        }
        
        .file-input {
            display: none;
        }
        
        .btn-upload {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
        }
        
        .btn-upload:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .file-list {
            margin-top: 20px;
        }
        
        .file-item {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid #667eea;
        }
        
        .file-item i {
            color: #667eea;
            margin-right: 10px;
        }
        
        .remove-file {
            background: none;
            border: none;
            color: #f56565;
            cursor: pointer;
            font-size: 1.2rem;
        }
        
        .status-section {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #edf2f7;
        }
        
        .status-item {
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            display: flex;
            align-items: center;
        }
        
        .status-pending {
            background: #fffaf0;
            border-left: 4px solid #f6ad55;
        }
        
        .status-success {
            background: #f0fff4;
            border-left: 4px solid #48bb78;
        }
        
        .status-error {
            background: #fff5f5;
            border-left: 4px solid #f56565;
        }
    </style>
</head>
<body>
    <button class="back-btn" onclick="window.history.back()">
        <i class="fas fa-arrow-left"></i> Volver al Dashboard
    </button>
    
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-database"></i> Carga de Data - Auditor</h1>
            <p>Sube archivos para auditoría y análisis de datos</p>
        </div>
        
        <div class="upload-section">
            <div class="drag-drop" id="dragDropArea" onclick="document.getElementById('fileInput').click()">
                <i class="fas fa-cloud-upload-alt"></i>
                <h3>Arrastra y suelta tus archivos aquí</h3>
                <p>O haz clic para seleccionar archivos</p>
                <p class="mt-2"><small class="text-muted">Formatos aceptados: CSV, Excel, JSON</small></p>
            </div>
            
            <input type="file" id="fileInput" class="file-input" multiple accept=".csv,.xlsx,.xls,.json">
            
            <button class="btn-upload" onclick="uploadFiles()">
                <i class="fas fa-upload"></i> Subir Archivos Seleccionados
            </button>
            
            <div class="file-list" id="fileList"></div>
        </div>
        
        <div class="status-section">
            <h4><i class="fas fa-info-circle"></i> Estado de Cargas Recientes</h4>
            <div id="statusList">
                <div class="status-item status-pending">
                    <i class="fas fa-clock"></i>
                    <span class="ms-2">Esperando archivos...</span>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let selectedFiles = [];
        
        // Manejar arrastrar y soltar
        const dragDropArea = document.getElementById('dragDropArea');
        
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dragDropArea.addEventListener(eventName, preventDefaults, false);
        });
        
        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }
        
        ['dragenter', 'dragover'].forEach(eventName => {
            dragDropArea.addEventListener(eventName, highlight, false);
        });
        
        ['dragleave', 'drop'].forEach(eventName => {
            dragDropArea.addEventListener(eventName, unhighlight, false);
        });
        
        function highlight() {
            dragDropArea.style.borderColor = '#667eea';
            dragDropArea.style.backgroundColor = '#edf2f7';
        }
        
        function unhighlight() {
            dragDropArea.style.borderColor = '#cbd5e0';
            dragDropArea.style.backgroundColor = '';
        }
        
        dragDropArea.addEventListener('drop', handleDrop, false);
        
        function handleDrop(e) {
            const dt = e.dataTransfer;
            const files = dt.files;
            handleFiles(files);
        }
        
        document.getElementById('fileInput').addEventListener('change', function(e) {
            handleFiles(e.target.files);
        });
        
        function handleFiles(files) {
            selectedFiles = Array.from(files);
            updateFileList();
        }
        
        function updateFileList() {
            const fileList = document.getElementById('fileList');
            fileList.innerHTML = '';
            
            if (selectedFiles.length === 0) {
                fileList.innerHTML = '<p class="text-muted">No hay archivos seleccionados</p>';
                return;
            }
            
            selectedFiles.forEach((file, index) => {
                const fileItem = document.createElement('div');
                fileItem.className = 'file-item';
                fileItem.innerHTML = `
                    <div>
                        <i class="fas fa-file"></i>
                        <strong>${file.name}</strong> (${formatFileSize(file.size)})
                    </div>
                    <button class="remove-file" onclick="removeFile(${index})">
                        <i class="fas fa-times"></i>
                    </button>
                `;
                fileList.appendChild(fileItem);
            });
        }
        
        function removeFile(index) {
            selectedFiles.splice(index, 1);
            updateFileList();
        }
        
        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
        }
        
        function uploadFiles() {
            if (selectedFiles.length === 0) {
                alert('Por favor selecciona al menos un archivo');
                return;
            }
            
            // Aquí iría la lógica de subida real
            alert(`Subiendo ${selectedFiles.length} archivo(s)...\nEsta funcionalidad se implementará próximamente.`);
            
            // Limpiar lista después de la "subida"
            selectedFiles = [];
            updateFileList();
            
            // Actualizar estado
            updateStatus('Archivo(s) subido(s) exitosamente', 'success');
        }
        
        function updateStatus(message, type) {
            const statusList = document.getElementById('statusList');
            const statusClass = type === 'success' ? 'status-success' : 
                               type === 'error' ? 'status-error' : 'status-pending';
            
            const statusItem = document.createElement('div');
            statusItem.className = `status-item ${statusClass}`;
            statusItem.innerHTML = `
                <i class="fas ${type === 'success' ? 'fa-check-circle' : 
                               type === 'error' ? 'fa-exclamation-circle' : 'fa-clock'}"></i>
                <span class="ms-2">${message}</span>
            `;
            
            statusList.innerHTML = '';
            statusList.appendChild(statusItem);
        }
    </script>
</body>
</html>
