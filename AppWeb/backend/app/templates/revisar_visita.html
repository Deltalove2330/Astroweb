<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Revisar Datos – Visita {{ visit_id }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">
  <h2 class="mb-4">Revisar Datos – Visita #{{ visit_id }}</h2>

  <form id="formRevision">
    <input type="hidden" id="visitId" value="{{ visit_id }}">
    
    <div class="table-responsive">
      <table class="table table-sm align-middle">
        <thead class="table-light">
          <tr>
            <th>Producto</th><th>Fabricante</th>
            <th>Inv. Inicial</th><th>Inv. Final</th><th>Inv. Depósito</th>
            <th>Caras</th><th>Precio Bs</th><th>Precio USD</th>
          </tr>
        </thead>
        <tbody>
          {% for row in datos %}
          <tr data-id="{{ row.ID_BALANCE }}">
            <td><input class="form-control form-control-sm" value="{{ row.PRODUCTO }}" readonly></td>
            <td><input class="form-control form-control-sm" value="{{ row.FABRICANTE }}" readonly></td>
            <td><input type="number" name="inv_inicial" class="form-control form-control-sm" value="{{ row.INV_INICIAL }}"></td>
            <td><input type="number" name="inv_final"   class="form-control form-control-sm" value="{{ row.INV_FINAL }}"></td>
            <td><input type="number" name="inv_deposito" class="form-control form-control-sm" value="{{ row.INV_DEPOSITO }}"></td>
            <td><input type="number" name="caras"       class="form-control form-control-sm" value="{{ row.CARAS }}"></td>
            <td><input type="number" step="0.01" name="precio_bs"  class="form-control form-control-sm" value="{{ row.PRECIO_BS }}"></td>
            <td><input type="number" step="0.01" name="precio_usd" class="form-control form-control-sm" value="{{ row.PRECIO_DS }}"></td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
    <button type="submit" class="btn btn-primary mt-3">Guardar cambios</button>
    <a href="/" class="btn btn-secondary mt-3 ms-2">Volver</a>
  </form>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script>
    $(document).ready(function() {
      $('#formRevision').on('submit', function(e) {
        e.preventDefault();
        
        const visitId = $('#visitId').val();
        const balances = [];
        
        // Recorrer cada fila de la tabla
        $('tbody tr').each(function() {
          const $row = $(this);
          const inputs = $row.find('input');
          
          balances.push({
            id_balance: $row.data('id'),
            inv_inicial: inputs.eq(2).val(),  // índice 2: inv_inicial
            inv_final: inputs.eq(3).val(),    // índice 3: inv_final
            inv_deposito: inputs.eq(4).val(), // índice 4: inv_deposito
            caras: inputs.eq(5).val(),        // índice 5: caras
            precio_bs: inputs.eq(6).val(),    // índice 6: precio_bs
            precio_usd: inputs.eq(7).val()    // índice 7: precio_usd
          });
        });
        
        // Enviar datos al servidor
        $.ajax({
          url: '/api/update-visit-balances',
          method: 'POST',
          contentType: 'application/json',
          data: JSON.stringify({
            visit_id: visitId,
            balances: balances
          }),
          success: function(response) {
            if (response.success) {
              alert('Cambios guardados exitosamente');
              window.location.href = '/';  // Redirigir a la página principal
            } else {
              alert('Error: ' + response.message);
            }
          },
          error: function(xhr) {
            alert('Error en la solicitud: ' + xhr.responseText);
          }
        });
      });
    });
  </script>
</body>
</html>
